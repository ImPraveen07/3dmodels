<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Minecraft - High Quality Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif;}
        
        #joystick-wrapper {
            position: absolute; bottom: 40px; left: 40px;
            width: 130px; height: 130px;
            background: rgba(0,0,0,0.3); border-radius: 50%;
            z-index: 10; touch-action: none; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 40px; left: 40px;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.8); border-radius: 50%; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 24px; height: 24px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 5; opacity: 0.8;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: white;
            box-shadow: 0px 0px 2px black;
        }
        #crosshair::before { top: 11px; left: 0; width: 24px; height: 2px; }
        #crosshair::after { top: 0; left: 11px; width: 2px; height: 24px; }

        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #87CEEB; color: white; display: flex; 
            align-items: center; justify-content: center; z-index: 999;
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>
    <div id="loader">Loading HD World...</div>
    
    <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, instancedBlocks, raycaster;
        let moveX = 0, moveZ = 0;
        let yaw = 0, pitch = 0; 
        const center = new THREE.Vector2(0, 0); 

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 8, 35); // Fog closer to hide map edges gracefully

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 10, 0); 

            // RESTORED GRAPHICS: High pixel ratio, shadows ON
            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();

            setupLighting();
            loadWorld();
            setupControls();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            animate();
        }

        function setupLighting() {
            const ambient = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            scene.add(ambient);

            const sunLight = new THREE.DirectionalLight(0xffffee, 2.0);
            sunLight.position.set(20, 40, 20); 
            sunLight.castShadow = true;
            
            // Optimized shadow settings for mobile
            sunLight.shadow.mapSize.width = 1024; 
            sunLight.shadow.mapSize.height = 1024;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 100;
            sunLight.shadow.camera.left = -20;
            sunLight.shadow.camera.right = 20;
            sunLight.shadow.camera.top = 20;
            sunLight.shadow.camera.bottom = -20;
            sunLight.shadow.bias = -0.001; 
            scene.add(sunLight);
        }

        function loadWorld() {
            const loader = new GLTFLoader();
            loader.load('soilblock.glb', (gltf) => {
                let mesh;
                gltf.scene.traverse(n => { 
                    if(n.isMesh) { 
                        mesh = n; 
                        mesh.castShadow = true; 
                        mesh.receiveShadow = true; 
                    }
                });

                const box = new THREE.Box3().setFromObject(mesh);
                const size = new THREE.Vector3();
                box.getSize(size);
                
                const sX = size.x;
                const sY = size.y;
                const sZ = size.z;

                // THE LAG FIX: Smaller Map Size (10x10 grid instead of 16x16)
                // This means ~100 blocks to render instead of 256+.
                const mapSize = 10; 
                const matrices = [];
                
                // VERTICAL ROTATION (X-Axis, 90 Degrees)
                const quaternion = new THREE.Quaternion();
                quaternion.setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2);
                const scale = new THREE.Vector3(1, 1, 1);

                for(let x = -mapSize/2; x < mapSize/2; x++) {
                    for(let z = -mapSize/2; z < mapSize/2; z++) {
                        let hillHeight = Math.floor(Math.sin(x * 0.4) * 2 + Math.cos(z * 0.4) * 2) + 2;
                        
                        for(let y = 0; y <= hillHeight; y++) {
                            const tempMatrix = new THREE.Matrix4();
                            const position = new THREE.Vector3(x * sX, y * sY, z * sZ);
                            
                            tempMatrix.compose(position, quaternion, scale);
                            matrices.push(tempMatrix);
                        }
                    }
                }

                instancedBlocks = new THREE.InstancedMesh(mesh.geometry, mesh.material, matrices.length);
                instancedBlocks.castShadow = true;
                instancedBlocks.receiveShadow = true;

                for(let i = 0; i < matrices.length; i++) {
                    instancedBlocks.setMatrixAt(i, matrices[i]);
                }
                
                scene.add(instancedBlocks);
                document.getElementById('loader').style.display = 'none'; 
            });
        }

        function setupControls() {
            const knob = document.getElementById('joystick-knob');
            const wrapper = document.getElementById('joystick-wrapper');
            
            wrapper.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const rect = wrapper.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                
                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxDist = 40;
                
                if(dist > maxDist) { dx *= maxDist/dist; dy *= maxDist/dist; }
                
                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                moveX = dx / maxDist;
                moveZ = dy / maxDist;
            });

            wrapper.addEventListener('touchend', () => {
                knob.style.transform = `translate(0px, 0px)`;
                moveX = 0; moveZ = 0;
            });

            let lastTouchX, lastTouchY;
            let breakTimer = null;
            let isDragging = false;

            window.addEventListener('touchstart', (e) => {
                if(e.target.closest('#joystick-wrapper')) return;
                
                isDragging = false;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;

                breakTimer = setTimeout(() => {
                    if(!isDragging) breakBlock();
                }, 600);
            });

            window.addEventListener('touchmove', (e) => {
                if(e.target.closest('#joystick-wrapper')) return;
                
                const touch = e.touches[0];
                const dx = touch.clientX - lastTouchX;
                const dy = touch.clientY - lastTouchY;
                
                if(Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    isDragging = true; 
                    clearTimeout(breakTimer);
                }
                
                yaw -= dx * 0.004;
                pitch -= dy * 0.004;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            });

            window.addEventListener('touchend', () => {
                clearTimeout(breakTimer); 
            });
        }

        function breakBlock() {
            if(!instancedBlocks) return;

            raycaster.setFromCamera(center, camera);
            const intersects = raycaster.intersectObject(instancedBlocks);

            if(intersects.length > 0) {
                const instanceId = intersects[0].instanceId;
                
                const hideMatrix = new THREE.Matrix4();
                hideMatrix.makeScale(0, 0, 0); 
                
                instancedBlocks.setMatrixAt(instanceId, hideMatrix);
                instancedBlocks.instanceMatrix.needsUpdate = true;
                
                if(navigator.vibrate) navigator.vibrate(50);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            const speed = 0.15;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            
            forward.y = 0; right.y = 0; 
            forward.normalize(); right.normalize();

            camera.position.addScaledVector(forward, -moveZ * speed);
            camera.position.addScaledVector(right, moveX * speed);
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
